# This is the environment file for the `spaceborne` conda environment

name: spaceborne
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.13.*
  - pip
  - numpy
  - scipy<1.17 # due to potential conflicts with heracles 25.1
  - matplotlib
  - healpy

  # PyCCL dependencies - mandatory
  - swig
  - cmake
  - pyccl>=3.2.1

  # pymaster dependencies - optional
  - cfitsio
  - fftw
  - namaster

  # uncommenting these may help in case of issues with the pylevin installation
  - c-compiler
  - cxx-compiler
  - llvm-openmp
  - boost
  - gsl






  - pip:
      - pytest # required to run the test suite (CI and local)
      - jax
      - euclidlib>=2026.4
        # optional dependency, only used to read the n(z) and C(l)
        # in the official Euclid LE3 format
      - heracles>=25.1
        # optional dependency, only used to save the covariance
        # in the official Euclid LE3 format
      - "cloelib[pylevin,mpmath] @ git+https://github.com/cloe-org/cloelib.git@v0.10"
        # optional dependency, only used to compute the COSEBIs covariance
      - pyyaml
      - joblib
      - tqdm
      - pyfiglet # optional dependency, for the ASCII art

# COSEBIs covariance needs cloelib as an additional dependency, which in turn uses pylevin.
# The installation of both is included in this env file, but
# please refer to each package's documentation for detailed and up-to-date installation instructions