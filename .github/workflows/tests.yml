name: tests

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

# Cancel an in-progress run if a newer commit is pushed to the same branch.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        # Required so each step runs inside the activated conda environment.
        shell: bash -l {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up conda environment from environment.yaml
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yaml
          environment-name: spaceborne
          # Cache the solved environment so subsequent runs skip the (slow)
          # dependency solve. The key includes a hash of environment.yaml, so
          # the cache is rebuilt automatically whenever dependencies change.
          cache-environment: true
          cache-environment-key: env-${{ runner.os }}-${{ hashFiles('environment.yaml') }}

      - name: Show environment info
        run: |
          micromamba info
          python --version
          python -c "import pyccl, jax, healpy; print('imports OK')"

      - name: Run unit tests
        run: python -m pytest tests/ -v
